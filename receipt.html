<!DOCTYPE html>
<html>
<head>
    <title>Receipt</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-box">
  <div class="receipt-header">
    <h1>Fresh Grocery Store</h1>
    <h2>Thank You for Your Order!</h2>

    <p><strong>Order ID:</strong> <span id="orderId"></span></p>
    <p><strong>Date:</strong> <span id="date"></span></p>
    <p><strong>Time:</strong> <span id="time"></span></p>

    <hr>
  </div>
    <h2>Order Receipt</h2>

    <p><b>Name:</b> <span id="rname"></span></p>
    <p><b>Address:</b> <span id="raddress"></span></p>
    <p><b>Phone:</b> <span id="rphone"></span></p>

    <h3>Products</h3>
    <div id="products"></div>

    <h3 id="total"></h3>

    <p><b>Thank You for Shopping!</b></p>

</div>

<script src="receipt.js"></script>

</body>
</html>
<p style="text-align:center; color:green; font-weight:bold;">
    Thank you for shopping with us! 😊
</p>
<button class="bottom-btn" onclick="goHome()">Back to Home</button>
